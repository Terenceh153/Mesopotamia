<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
 --amber:#c87820;--gold:#f0b840;--cream:#f8e8b0;--dark:#1a0a00;
 --green:#386820;--blue:#5888c0;--tan:#c8a060;--dkgreen:#204810;
 --red:#883010;--panel-bg:#0d0500;--border-outer:#f0b840;--border-inner:#8b5020;
}
body{
 background-color:#0d0800;
 background-image:
 linear-gradient(rgba(200,120,32,0.04) 1px,transparent 1px),
 linear-gradient(90deg,rgba(200,120,32,0.04) 1px,transparent 1px);
 background-size:32px 32px;
 font-family:'Press Start 2P',monospace;
 color:var(--cream);
 min-height:100vh;
 overflow-x:hidden;
 position:relative;
}
body::before{
 content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;
 background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
}
.panel{background:var(--panel-bg);border:4px solid var(--gold);box-shadow:inset 0 0 0 2px var(--border-inner),4px 4px 0 #000;image-rendering:pixelated;}
#header{
 display:flex;align-items:center;justify-content:space-between;
 padding:0 16px;height:56px;
 background:#0d0500;
 border-bottom:4px solid var(--gold);
 box-shadow:inset 0 -2px 0 var(--border-inner),0 4px 0 #000;
}
#title{font-size:9px;color:var(--gold);letter-spacing:1px;text-shadow:2px 2px 0 #000;}
#blink-text{font-size:7px;color:var(--cream);animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#era-label{font-size:7px;color:var(--amber);text-align:right;}
#main{display:flex;gap:0;height:calc(100vh - 56px - 112px);}
#canvas-wrap{
 flex:1;display:flex;align-items:center;justify-content:center;
 background:#0a0400;border-right:4px solid var(--gold);
 overflow:hidden;position:relative;
}
#gameCanvas{image-rendering:pixelated;cursor:crosshair;display:block;}
#hud{
 width:240px;min-width:240px;
 background:var(--panel-bg);
 display:flex;flex-direction:column;
 overflow-y:auto;padding:8px;gap:6px;
}
.hud-title{font-size:7px;color:var(--gold);text-align:center;padding:4px 0;border-bottom:2px solid var(--amber);}
.stat-row{display:flex;flex-direction:column;gap:3px;}
.stat-vals{display:flex;justify-content:space-between;align-items:center;}
.stat-name{font-size:5px;color:var(--cream);}
.stat-value{font-size:6px;color:var(--gold);}
.stat-bar-bg{width:100%;height:5px;background:#1a0a00;border:1px solid var(--amber);}
.stat-bar-fill{height:100%;background:var(--amber);transition:width 0.3s;}
.people-log{
 margin-top:4px;padding:6px;
 background:#0a0300;border:1px solid #3a1a00;
 font-size:5px;color:#a07040;line-height:2.2;
 transition:opacity 0.3s;
}
.people-log-title{font-size:6px;color:#6a3a10;margin-bottom:6px;}
#bottom{
 height:112px;background:#0d0500;
 border-top:4px solid var(--gold);
 box-shadow:inset 0 2px 0 var(--border-inner);
 display:flex;flex-direction:column;
 padding:8px 16px 6px;gap:6px;
}
#slider-wrap{display:flex;align-items:center;gap:8px;}
#era-slider{
 flex:1;height:14px;-webkit-appearance:none;appearance:none;
 background:linear-gradient(to right,var(--amber) 0%,var(--amber) var(--pct,0%),#1a0a00 var(--pct,0%));
 border:3px solid var(--gold);outline:none;cursor:pointer;
 image-rendering:pixelated;
}
#era-slider::-webkit-slider-thumb{
 -webkit-appearance:none;width:20px;height:20px;
 background:var(--gold);border:3px solid #000;
 cursor:pointer;image-rendering:pixelated;
}
#era-slider::-moz-range-thumb{width:20px;height:20px;background:var(--gold);border:3px solid #000;cursor:pointer;}
#era-num{font-size:7px;color:var(--gold);min-width:36px;text-align:right;}
#era-labels{display:flex;justify-content:space-between;}
.era-lbl{
 font-size:5px;color:#444;text-align:center;flex:1;padding:2px;
 cursor:pointer;transition:color 0.2s;
}
.era-lbl.active{color:var(--gold);text-decoration:underline;text-underline-offset:3px;}

/* NONDESCRIPT EDIT BUTTON */
#edit-btn{
 position:fixed;bottom:6px;right:8px;
 width:10px;height:10px;
 background:#1a0a00;border:1px solid #2a1400;
 cursor:pointer;z-index:8000;opacity:0.4;
}
#edit-btn:hover{opacity:0.7;}

/* CITATIONS BUTTON */
#citations-btn{
 position:fixed;bottom:8px;left:8px;
 width:100px;height:28px;
 background:#3a1a00;border:3px solid var(--gold);
 box-shadow:inset 0 0 0 1px var(--border-inner),2px 2px 0 #000;
 cursor:pointer;z-index:8000;opacity:0.9;
 display:flex;align-items:center;justify-content:center;
}
#citations-btn:hover{opacity:1;background:#4a2a10;}

/* CITATIONS MODAL */
#citations-overlay{
 display:none;position:fixed;inset:0;
 background:rgba(0,0,0,0.92);z-index:9002;
 align-items:center;justify-content:center;
 overflow-y:auto;padding:20px 0;
}
#citations-overlay.open{display:flex;}
#citations-box{
 background:#0d0500;border:4px solid var(--gold);
 box-shadow:inset 0 0 0 2px var(--border-inner),8px 8px 0 #000;
 padding:20px;width:90%;max-width:650px;
}
#citations-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:2px solid var(--amber);padding-bottom:10px;}
#citations-title{font-size:8px;color:var(--gold);}
#citations-close{
 background:#883010;border:3px solid var(--gold);
 color:var(--gold);font-family:'Press Start 2P',monospace;
 font-size:8px;padding:4px 6px;cursor:pointer;
}
#citations-content{
 font-size:5px;color:var(--cream);line-height:2.8;
 max-height:70vh;overflow-y:auto;
}
.citation{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #3a1a00;}
.citation:last-child{border-bottom:none;}
.citation strong{color:var(--amber);}

/* PASSWORD MODAL */
#pw-overlay{
 display:none;position:fixed;inset:0;
 background:rgba(0,0,0,0.88);z-index:9000;
 align-items:center;justify-content:center;
}
#pw-overlay.open{display:flex;}
#pw-box{
 background:#0d0500;border:4px solid var(--gold);
 box-shadow:inset 0 0 0 2px var(--border-inner),8px 8px 0 #000;
 padding:20px;width:320px;
}
#pw-title{font-size:8px;color:var(--gold);margin-bottom:14px;}
#pw-input{
 width:100%;background:#000;border:2px solid var(--amber);
 color:var(--gold);font-family:'Press Start 2P',monospace;
 font-size:8px;padding:6px 8px;outline:none;margin-bottom:10px;
}
#pw-error{font-size:6px;color:#c03020;min-height:12px;margin-bottom:8px;}
#pw-btns{display:flex;gap:8px;}
.pw-btn{
 background:#1a0a00;border:2px solid var(--amber);color:var(--gold);
 font-family:'Press Start 2P',monospace;font-size:7px;
 padding:5px 8px;cursor:pointer;flex:1;
}
.pw-btn:hover{background:#2a1400;}

/* EDITOR MODAL */
#editor-overlay{
 display:none;position:fixed;inset:0;
 background:rgba(0,0,0,0.92);z-index:9001;
 align-items:flex-start;justify-content:center;
 overflow-y:auto;padding:20px 0;
}
#editor-overlay.open{display:flex;}
#editor-box{
 background:#0d0500;border:4px solid var(--gold);
 box-shadow:inset 0 0 0 2px var(--border-inner),8px 8px 0 #000;
 padding:20px;width:90%;max-width:700px;
}
#editor-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:2px solid var(--amber);padding-bottom:10px;}
#editor-title{font-size:8px;color:var(--gold);}
#editor-close{
 background:#883010;border:3px solid var(--gold);
 color:var(--gold);font-family:'Press Start 2P',monospace;
 font-size:8px;padding:4px 6px;cursor:pointer;
}
.ed-section{margin-bottom:18px;}
.ed-section-title{font-size:7px;color:var(--amber);margin-bottom:8px;border-left:3px solid var(--amber);padding-left:6px;}
.ed-field{margin-bottom:10px;}
.ed-label{font-size:5px;color:#a07040;margin-bottom:4px;display:block;}
.ed-input{
 width:100%;background:#000;border:1px solid #3a1a00;
 color:var(--cream);font-family:'Press Start 2P',monospace;
 font-size:6px;padding:5px 7px;outline:none;resize:vertical;
}
.ed-input:focus{border-color:var(--amber);}
textarea.ed-input{min-height:60px;line-height:1.8;}
#editor-save{
 background:#204810;border:3px solid var(--gold);
 color:var(--gold);font-family:'Press Start 2P',monospace;
 font-size:7px;padding:8px 14px;cursor:pointer;margin-top:6px;
}
#editor-save:hover{background:#306820;}
#editor-saved{font-size:6px;color:#60c040;margin-left:10px;opacity:0;transition:opacity 0.3s;}

/* TILE INFO MODAL */
#modal-overlay{
 display:none;position:fixed;inset:0;
 background:rgba(0,0,0,0.82);z-index:1000;
 align-items:center;justify-content:center;
}
#modal-overlay.open{display:flex;}
#modal{
 background:#0d0500;border:4px solid var(--gold);
 box-shadow:inset 0 0 0 2px var(--border-inner),8px 8px 0 #000;
 max-width:500px;width:90%;max-height:80vh;overflow-y:auto;
 padding:16px;position:relative;
}
#modal-close{
 position:absolute;top:8px;right:8px;
 background:#883010;border:3px solid var(--gold);
 color:var(--gold);font-family:'Press Start 2P',monospace;
 font-size:8px;padding:4px 6px;cursor:pointer;
}
#modal-close:active{transform:translateY(2px);}
#modal-icon{font-size:10px;color:var(--amber);margin:8px 0;line-height:2;white-space:pre;font-family:monospace;}
#modal-title{font-size:9px;color:var(--gold);margin-bottom:8px;}
#modal-body{font-size:6px;color:var(--cream);line-height:2.4;}
#modal-body p{margin-bottom:10px;}
#modal-body strong{color:var(--amber);}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity 0.08s;}
#tile-hover{
 position:absolute;bottom:8px;left:8px;
 background:rgba(13,5,0,0.9);border:1px solid #3a1a00;
 font-size:5px;color:#a07040;padding:4px 6px;
 pointer-events:none;display:none;
}
</style>
</head>

<script>
var era=0,riverFrame=0,prevEraRange=-1,currentHoverTile=null,statDisplayValues={};
var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
var TILE=32,COLS=20,ROWS=14;

var MAP=[
 ['river','river','grass','grass','forest','forest','forest','forest','forest','forest','forest','forest','forest','forest','forest','desert','desert','desert','desert','desert'],
 ['river','river','grass','grass','forest','forest','forest','forest','forest','forest','forest','forest','forest','forest','temple','temple','desert','desert','desert','desert'],
 ['river','river','grass','farmland','grass','grass','forest','forest','house','house','granary','house','house','forest','temple','temple','desert','desert','desert','desert'],
 ['river','river','grass','farmland','grass','gathering_hut','house','house','house','house','granary','house','house','house','house','house','desert','desert','desert','desert'],
 ['river','river','grass','farmland','gathering_hut','gathering_hut','house','market','market','market','house','house','house','house','house','house','house','desert','desert','desert'],
 ['river','river','grass','grass','gathering_hut','house','house','market','market','market','house','house','house','house','house','house','house','house','desert','desert'],
 ['river','river','grass','grass','house','house','house','house','granary','granary','house','house','house','animal_pen','animal_pen','house','house','desert','desert','desert'],
 ['river','river','grass','grass','house','house','house','house','house','house','house','house','house','animal_pen','animal_pen','house','house','desert','desert','desert'],
 ['river','river','grass','farmland','farmland','farmland','house','house','house','house','house','house','house','animal_pen','animal_pen','house','house','desert','desert','desert'],
 ['river','river','river','farmland','farmland','farmland','farmland','house','house','house','house','house','animal_pen','animal_pen','house','house','desert','desert','desert','desert'],
 ['river','river','river','grass','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','desert','desert','desert','desert'],
 ['river','river','river','grass','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','desert','desert','desert','desert'],
 ['river','river','grass','grass','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','farmland','desert','desert','desert','desert','desert','desert'],
 ['river','river','grass','grass','grass','grass','grass','grass','desert','desert','desert','desert','desert','desert','desert','desert','desert','desert','desert','desert'],
];

var BUILDING_INFO={
 gathering_hut:{name:'GATHERING HUT',icon:' /\\\n / \\\n|____|\n ||',text:'<strong>GATHERING ERA:</strong> Rudimentary shelters woven from reeds and animal skins were created at seasonal camps. People ate, slept, and stored food in this space. These structures took hours to build and days to dismantle and were designed to be portable to follow the herds.<br><br><strong>AGRICULTURAL ERA:</strong> These huts were replaced with permanent housing structures. Walls were thick to insulate against Mesopotamian heat. A single family had a dedicated sleeping room and a separate cooking area, which was a big improvement in stability of life and structure.'},
 house:{name:'MUD-BRICK HOUSE',icon:' ___\n| |\n|[_]|\n|___|',text:'<strong>GATHERING ERA:</strong> Gathering groups slept in shared shelters. There was no concept of private domestic space. Instead, survivai was put as the priority. People owned very little and everything had to be carried to follow the seasons.<br><br><strong>AGRICULTURAL ERA:</strong> Permanent mud-brick houses were created around 9000 BCE and spread to Mesopotamia, which made the thought of the private household. Women practiced domestic labor grinding grain, weaving, and creating pottery. Larger homes showed wealth for the first time, which showed that hierarchies were introduced.'},
 market:{name:'MARKET / BAZAAR',icon:' ====\n|MKT |\n|$ $|\n|____|',text:'<strong>GATHERING ERA:</strong> No formal exchanging existed. Food was shared in family groups. Successful hunters gave meat to the groups. Trade between groups was rare and ceremonial. <br><br><strong>AGRICULTURAL ERA:</strong> As agricultural surplus increased, trade emerged. The earliest Mesopotamian markets were open areas near the temple where grain, oil, linen, and copper tools were exchanged at standard rates. Clay tokens and cuneiform marks showed the record of transactions.'},
 farmland:{name:'CULTIVATED FIELDS',icon:'~~~~~~~~\n|||||||||\n~wheat~~\n||||||||',text:'<strong>GATHERING ERA:</strong> This ground was flood plain, which was dangerous, rich with wild grasses after the waters left. Gatherers harvested wild wheat from these areas seasonally but never stayed permenanetly.<br><br><strong>AGRICULTURAL ERA:</strong> Around 10,000 BCE, Mesopotamians began deliberately planting wheat and barley in flood-receded soil. Selective cultivation turned wild grasses into reliable crops with larger seeds. Surplus grain changed everything because it could be stored, taxed, and traded. The world\'s first taxation was grain.'},
 granary:{name:'GRAIN GRANARY',icon:' /\\\n |==|\n |==|\n |__|',text:'<strong>GATHERING ERA:</strong> Gathered food could not be stored in large amounts. Wild fruits rotted in a few days, and dried meat only lasted at most 2 weeks. Groups had no reason and no ability to stay in one place. The amount of harvest alternated with the seasons and migrations.<br><br><strong>AGRICULTURAL ERA:</strong> The granary changed human civilization permanently. A community could survive drought years by storing thousands of kilograms of dried grain. This also supported non-farming workers (priests, soldiers, scribes). The first granaries were public, and were managed by temple priests.'},
 animal_pen:{name:'LIVESTOCK',icon:'[------]\n|o  o  |\n| o  o |\n[------]',text:'<strong>GATHERING ERA:</strong> Wild goats were hunted throughout the gathering era. Evidence at archeological sites revealed the hunting patterns. Groups followed animal herd migrations along the Tigris and Euphrates rivers. Animals were sacred, feared, and consumed, however they were never owned by early humans.<br><br><strong>AGRICULTURAL ERA:</strong> The shift to herding began when humans started protecting the younger animals rather than killing them. By around 8000 BCE, goats and sheep were domesticated in the Zagros Mountains. The fenced pen is one of humanitys earliest pieces of built infrastructure. Domesticated animals provided lots of materials ,not just meat but milk and wool as well.'},
 temple:{name:'ZIGGURAT TEMPLE',icon:'   /\\\n  /==\\\n /====\\\n/======\\',text:'<strong>GATHERING ERA:</strong> Early rituals were portable, with sacred items, bones, and ochre markings. There were no permanent sacred places because the people themselves werent permanent either, and the gods moved along with the people.<br><br><strong>AGRICULTURAL ERA:</strong> The ziggurat emerged as the citys tallest structure, and was made for the gods to reach the land. The temple was also an economic center. It stored grain, organized labor, counted debts, and also redistributed money. The priests were literally the accountants. The ziggurat of Ur, built around 2100 BCE, still stands (partially) today.'},
 forest:{name:'CEDAR FOREST',icon:'  /\\\n /  \\\n/ ** \\\n  ||',text:'<strong>GATHERING ERA:</strong> Dense forests lined both rivers of mesopotamia. These forests were main hunting grounds, medicine cabinets, and spiritual homes. The earliest stories and myths, like the epic of Gilgamesh start in the forest.<br><br><strong>AGRICULTURAL ERA:</strong> As populations grew and farming expanded, forests were cleared in place of fields. Mesopotamia\'s fertility began to go down within a thousand years of agriculture due to soil salinity and deforestation.'},
 river:{name:'THE GREAT RIVER',icon:'~~~~~~~~~~\n>> water >>\n~~~~~~~~~~\n>> flow >>',text:'<strong>GATHERING ERA:</strong> The two rivers,Tigris and Euphrates, were the foundations of life for this region. Gatherers camped along the river banks during migrations, drinking, and fishing. The river was both benificial and harmful. The flooding was unpredictable and deadly.<br><br><strong>AGRICULTURAL ERA:</strong> Mesopotamians learned to tame the river through irrigation, which was a technology that possibly might be humanity\'s greatest engineering feat. Networks of canals spread across the flood plain, extending fertile land far from the river\'s natural reach. The word "Mesopotamia" means "land between the rivers" in Greek.'}
};

var STATS=[
 {key:'pop',label:'POPULATION',unit:'ppl',min:12,max:8500},
 {key:'size',label:'CITY SIZE',unit:'km²',min:0.1,max:4.2},
 {key:'life',label:'LIFE EXPECTANCY',unit:'yrs',min:32,max:38},
 {key:'food',label:'FOOD SECURITY',unit:'%',min:15,max:87},
 {key:'live',label:'LIVESTOCK',unit:'ani',min:0,max:340},
 {key:'farm',label:'FARMLAND',unit:'ac',min:0,max:890},
];


var ERA_NAMES=['NOMADIC AGE','EARLY CAMP ERA','SETTLEMENT AGE','FARMING AGE','MAJOR CITIES'];
var ERA_RANGES=[0,21,41,61,81];

// =============================================
// DRAWING
// =============================================
function fillPx(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x,y,w,h);}
function drawGrass(tx,ty,e){fillPx(tx,ty,TILE,TILE,'#386820');var seeds=[[4,6],[14,20],[22,8],[8,26],[18,14],[26,22]];for(var i=0;i<seeds.length;i++){fillPx(tx+seeds[i][0],ty+seeds[i][1],2,3,'#204810');}if(e>60){fillPx(tx+10,ty+12,8,8,'rgba(200,160,96,0.3)');}}
function drawDesert(tx,ty){fillPx(tx,ty,TILE,TILE,'#c8a060');var p=[[4,8,3,3],[16,20,4,3],[22,6,3,4],[8,24,4,3]];for(var i=0;i<p.length;i++){fillPx(tx+p[i][0],ty+p[i][1],p[i][2],p[i][3],'#a07840');}}
function drawRiver(tx,ty,e){var col=(riverFrame===0)?'#1848a0':'#1060b8';fillPx(tx,ty,TILE,TILE,col);ctx.fillStyle='#5888c0';for(var row=0;row<3;row++){var wy=ty+6+row*10;for(var seg=0;seg<5;seg++){ctx.fillRect(tx+seg*7,wy+(seg%2),7,1);}}if(e>40){ctx.fillStyle='#703010';ctx.fillRect(tx,ty+TILE-2,TILE,2);ctx.fillRect(tx+TILE-2,ty,2,TILE);}}
function drawForest(tx,ty,e){fillPx(tx,ty,TILE,TILE,'#386820');if(e>50){fillPx(tx+12,ty+20,8,12,'#4a2800');fillPx(tx+8,ty+22,4,4,'#a07840');}else{fillPx(tx+12,ty+22,8,8,'#4a2800');var layers=[[8,6,16],[10,4,12],[14,4,6]];for(var i=0;i<layers.length;i++){var l=layers[i];fillPx(tx+l[0],ty+l[1],l[2],(i===0?8:i===1?8:6),'#204810');}fillPx(tx+14,ty+4,4,4,'#2d5818');}}
function drawGatheringHut(tx,ty,e){if(e>40){drawGrass(tx,ty,e);return;}fillPx(tx,ty,TILE,TILE,'#386820');var base=[[6,20,20],[8,4,16],[12,4,8]];for(var i=0;i<base.length;i++){fillPx(tx+base[i][0],ty+12+i*4,base[i][1],4,'#8b5a2b');}fillPx(tx+14,ty+22,4,6,'#1a0a00');var roof=[[8,8,16],[10,4,12],[14,4,4]];for(var j=0;j<roof.length;j++){fillPx(tx+roof[j][0],ty+4+j*4,roof[j][1],4,'#c8a060');}}
function drawHouse(tx,ty,e){if(e<20){drawGrass(tx,ty,e);return;}fillPx(tx,ty,TILE,TILE,'#386820');var h=18,oy=ty+TILE-h-2;if(e>70){h=24;oy=ty+TILE-h-2;}fillPx(tx+4,oy,24,h,'#c8a060');fillPx(tx+3,oy-4,26,5,'#a07840');fillPx(tx+13,oy+h-8,6,8,'#1a0a00');fillPx(tx+6,oy+4,4,4,'#5888c0');fillPx(tx+22,oy+4,4,4,'#5888c0');if(e>70){fillPx(tx+4,oy-10,24,7,'#b88848');fillPx(tx+3,oy-11,26,2,'#a07840');fillPx(tx+15,oy-18,4,8,'#886040');}}
function drawMarket(tx,ty,e){if(e<50){drawHouse(tx,ty,e);return;}fillPx(tx,ty,TILE,TILE,'#386820');fillPx(tx+2,ty+12,28,16,'#c87820');fillPx(tx+2,ty+7,28,6,'#883010');for(var s=0;s<7;s++){fillPx(tx+2+s*4,ty+7,2,6,'#f0b840');}fillPx(tx+2,ty+20,6,8,'#1a0a00');fillPx(tx+2,ty+10,8,6,'#1a0a00');fillPx(tx+7,ty+12,6,4,'#f0b840');}
function drawFarmland(tx,ty,e){if(e<35){drawGrass(tx,ty,e);return;}fillPx(tx,ty,TILE,TILE,'#a07840');for(var r=0;r<4;r++){for(var c=0;c<4;c++){var cx=tx+2+c*8,cy=ty+2+r*8;fillPx(cx,cy,6,6,'#c8a060');if(e>55&&(r+c)%2===0){fillPx(cx+2,cy+2,2,2,'#386820');}if(e>75){fillPx(cx+2,cy+1,2,3,'#f0b840');}}}}
function drawGranary(tx,ty,e){if(e<55){drawHouse(tx,ty,e);return;}fillPx(tx,ty,TILE,TILE,'#386820');fillPx(tx+8,ty+5,16,26,'#c8a060');for(var st=0;st<4;st++){fillPx(tx+8,ty+11+st*5,16,1,'#a07840');}var top=[[8,4,16],[10,4,12],[14,4,4]];for(var i=0;i<top.length;i++){fillPx(tx+top[i][0],ty+2+i*3,top[i][1],4,'#b89050');}}
function drawAnimalPen(tx,ty,e){if(e<25){drawGrass(tx,ty,e);return;}fillPx(tx,ty,TILE,TILE,'#a07840');ctx.strokeStyle='#4a2800';ctx.lineWidth=2;ctx.strokeRect(tx+2,ty+4,28,24);fillPx(tx+13,ty+4,6,2,'#a07840');var animals=[[5,10],[16,8],[22,16],[10,18]];for(var a=0;a<Math.min(animals.length,Math.floor(1+e/30));a++){var ax=tx+animals[a][0],ay=ty+animals[a][1];fillPx(ax,ay,8,6,'#c8a060');fillPx(ax-2,ay+1,3,4,'#c8a060');fillPx(ax+2,ay-2,4,3,'#c8a060');fillPx(ax+3,ay+2,2,2,'#1a0a00');}}
function drawTemple(tx,ty,e){if(e<75){drawHouse(tx,ty,e);return;}fillPx(tx,ty,TILE,TILE,'#386820');fillPx(tx+1,ty+22,30,8,'#c87820');fillPx(tx+5,ty+15,22,8,'#a07840');fillPx(tx+9,ty+9,14,7,'#f0b840');fillPx(tx+14,ty+5,4,5,'#f0b840');fillPx(tx+15,ty+2,2,4,'#f0b840');fillPx(tx+12,ty+22,8,8,'#1a0a00');}

function drawTile(tx,ty,type,e){
 switch(type){
 case 'river':drawRiver(tx,ty,e);break;case 'grass':drawGrass(tx,ty,e);break;case 'desert':drawDesert(tx,ty);break;
 case 'forest':drawForest(tx,ty,e);break;case 'gathering_hut':drawGatheringHut(tx,ty,e);break;case 'house':drawHouse(tx,ty,e);break;
 case 'market':drawMarket(tx,ty,e);break;case 'farmland':drawFarmland(tx,ty,e);break;case 'granary':drawGranary(tx,ty,e);break;
 case 'animal_pen':drawAnimalPen(tx,ty,e);break;case 'temple':drawTemple(tx,ty,e);break;default:drawGrass(tx,ty,e);
 }
}
function drawMap(e){
 ctx.clearRect(0,0,640,448);
 for(var row=0;row<ROWS;row++){for(var col=0;col<COLS;col++){drawTile(col*TILE,row*TILE,MAP[row][col],e);}}
 if(currentHoverTile){ctx.strokeStyle='#f0b840';ctx.lineWidth=2;ctx.strokeRect(currentHoverTile.col*TILE+1,currentHoverTile.row*TILE+1,TILE-2,TILE-2);}
}

// =============================================
// STATS & LOG
// =============================================
function lerp(a,b,t){return a+(b-a)*t;}
function getStatTarget(stat,e){var t=e/100,v=lerp(stat.min,stat.max,Math.pow(t,1.5));if(stat.unit==='km²')return Math.round(v*10)/10;return Math.round(v);}
function buildStatsUI(){
 var cont=document.getElementById('stats-container');cont.innerHTML='';
 STATS.forEach(function(s){
 statDisplayValues[s.key]=s.min;
 var row=document.createElement('div');row.className='stat-row';
 row.innerHTML='<div class="stat-vals"><span class="stat-name">'+s.label+'</span><span class="stat-value" id="sv-'+s.key+'">'+s.min+'</span></div><div class="stat-bar-bg"><div class="stat-bar-fill" id="sb-'+s.key+'" style="width:0%"></div></div>';
 cont.appendChild(row);
 });
}
function updateStats(e){STATS.forEach(function(s){var target=getStatTarget(s,e),pct=((target-s.min)/(s.max-s.min))*100;document.getElementById('sv-'+s.key).textContent=target+' '+s.unit;document.getElementById('sb-'+s.key).style.width=pct+'%';});}
function updatePeopleLog(e){
 var found=null;
 PEOPLE_LOG.forEach(function(p){if(e>=p.min&&e<p.max)found=p;});
 if(!found)found=PEOPLE_LOG[PEOPLE_LOG.length-1];
 var el=document.getElementById('people-log-text');
 el.style.opacity=0;setTimeout(function(){el.textContent=found.text;el.style.opacity=1;},300);
}

// =============================================
// ERA LABELS
// =============================================
function getEraIndex(e){var idx=0;for(var i=0;i<ERA_RANGES.length;i++){if(e>=ERA_RANGES[i])idx=i;}return idx;}
function updateEraLabels(e){
 var idx=getEraIndex(e);
 document.querySelectorAll('.era-lbl').forEach(function(el,i){el.classList.toggle('active',i===idx);});
 document.getElementById('era-label').textContent='ERA: '+ERA_NAMES[idx];
 var prevIdx=prevEraRange;
 if(prevIdx!==-1&&prevIdx!==idx){flashMap();}
 prevEraRange=idx;
}
function flashMap(){var f=document.getElementById('flash');f.style.opacity=0.5;setTimeout(function(){f.style.opacity=0;},80);}

// =============================================
// SLIDER
// =============================================
var slider=document.getElementById('era-slider');
slider.addEventListener('input',function(){
 era=parseInt(slider.value);
 document.getElementById('era-num').textContent=era;
 slider.style.setProperty('--pct',era+'%');
 drawMap(era);updateStats(era);updateEraLabels(era);updatePeopleLog(era);
 document.getElementById('blink-text').style.display='none';
});

// =============================================
// CANVAS INTERACTION
// =============================================
function getTileFromEvent(e){
 var rect=canvas.getBoundingClientRect();
 var scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;
 var mx=(e.clientX-rect.left)*scaleX,my=(e.clientY-rect.top)*scaleY;
 var col=Math.floor(mx/TILE),row=Math.floor(my/TILE);
 if(col<0||col>=COLS||row<0||row>=ROWS)return null;
 return {col:col,row:row,type:MAP[row][col]};
}
canvas.addEventListener('mousemove',function(e){
 var t=getTileFromEvent(e);currentHoverTile=t;
 var hover=document.getElementById('tile-hover');
 if(t&&BUILDING_INFO[t.type]){hover.style.display='block';hover.textContent='> '+BUILDING_INFO[t.type].name+' [CLICK]';}
 else{hover.style.display='none';}
 drawMap(era);
});
canvas.addEventListener('mouseleave',function(){currentHoverTile=null;document.getElementById('tile-hover').style.display='none';drawMap(era);});
canvas.addEventListener('click',function(e){var t=getTileFromEvent(e);if(t&&BUILDING_INFO[t.type]){openModal(t.type);}});

// =============================================
// TILE INFO MODAL
// =============================================
function openModal(type){
 var info=BUILDING_INFO[type];if(!info)return;
 document.getElementById('modal-title').textContent=info.name;
 document.getElementById('modal-icon').textContent=info.icon;
 document.getElementById('modal-body').innerHTML='<p>'+info.text+'</p>';
 document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// =============================================
// RIVER ANIMATION
// =============================================
setInterval(function(){riverFrame=(riverFrame===0)?1:0;drawMap(era);},800);

// =============================================
// PASSWORD MODAL
// =============================================
function openPwModal(){
 document.getElementById('pw-input').value='';
 document.getElementById('pw-error').textContent='';
 document.getElementById('pw-overlay').classList.add('open');
 setTimeout(function(){document.getElementById('pw-input').focus();},50);
}
function closePwModal(){document.getElementById('pw-overlay').classList.remove('open');}
function checkPw(){
 var val=document.getElementById('pw-input').value;
 if(val==='admin'){closePwModal();openEditor();}
 else{document.getElementById('pw-error').textContent='INCORRECT PASSWORD';}
}
document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});
document.getElementById('pw-overlay').addEventListener('click',function(e){if(e.target===this)closePwModal();});

// =============================================
// EDITOR
// =============================================
function openEditor(){
 var container=document.getElementById('editor-fields');
 container.innerHTML='';

 // Page title
 var sec=makeSec('PAGE TITLE');
 sec.appendChild(makeField('Page title','title-edit',document.getElementById('title').textContent,'input'));
 container.appendChild(sec);

 // Era names
 var sec2=makeSec('ERA NAMES');
 document.querySelectorAll('.era-lbl').forEach(function(el,i){
 sec2.appendChild(makeField('Era '+i+' bottom label','era-lbl-edit-'+i,el.innerText.replace('\n',' '),'input'));
 });
 ERA_NAMES.forEach(function(n,i){
 sec2.appendChild(makeField('Era '+i+' header name','era-name-edit-'+i,n,'input'));
 });
 container.appendChild(sec2);

 // People log
 var sec3=makeSec('PEOPLE LOG ENTRIES');
 PEOPLE_LOG.forEach(function(p,i){
 sec3.appendChild(makeField('Entry '+i+' (era '+p.min+'-'+p.max+')','plog-edit-'+i,p.text,'textarea'));
 });
 container.appendChild(sec3);

 // Building info
 Object.keys(BUILDING_INFO).forEach(function(key){
 var info=BUILDING_INFO[key];
 var sec4=makeSec('BUILDING: '+key.toUpperCase());
 sec4.appendChild(makeField('Name','bi-name-'+key,info.name,'input'));
 sec4.appendChild(makeField('Body text (HTML ok)','bi-text-'+key,info.text,'textarea'));
 container.appendChild(sec4);
 });

 document.getElementById('editor-saved').style.opacity=0;
 document.getElementById('editor-overlay').classList.add('open');
}

function makeSec(title){
 var sec=document.createElement('div');sec.className='ed-section';
 var t=document.createElement('div');t.className='ed-section-title';t.textContent=title;
 sec.appendChild(t);return sec;
}
function makeField(label,id,value,type){
 var wrap=document.createElement('div');wrap.className='ed-field';
 var lbl=document.createElement('label');lbl.className='ed-label';lbl.textContent=label;lbl.setAttribute('for',id);
 var inp=document.createElement(type==='textarea'?'textarea':'input');
 inp.className='ed-input';inp.id=id;inp.value=value;
 if(type!=='textarea'){inp.type='text';}
 wrap.appendChild(lbl);wrap.appendChild(inp);
 return wrap;
}

function saveEdits(){
 // Page title
 document.getElementById('title').textContent=document.getElementById('title-edit').value;

 // Era bottom labels
 document.querySelectorAll('.era-lbl').forEach(function(el,i){
 var inp=document.getElementById('era-lbl-edit-'+i);
 if(inp){el.innerHTML=inp.value.replace(' ','<br>');}
 });

 // Era header names
 ERA_NAMES.forEach(function(n,i){
 var inp=document.getElementById('era-name-edit-'+i);
 if(inp){ERA_NAMES[i]=inp.value;}
 });
 updateEraLabels(era);

 // People log
 PEOPLE_LOG.forEach(function(p,i){
 var inp=document.getElementById('plog-edit-'+i);
 if(inp){p.text=inp.value;}
 });
 updatePeopleLog(era);

 // Building info
 Object.keys(BUILDING_INFO).forEach(function(key){
 var nameInp=document.getElementById('bi-name-'+key);
 var textInp=document.getElementById('bi-text-'+key);
 if(nameInp){BUILDING_INFO[key].name=nameInp.value;}
 if(textInp){BUILDING_INFO[key].text=textInp.value;}
 });

 var saved=document.getElementById('editor-saved');
 saved.style.opacity=1;
 setTimeout(function(){saved.style.opacity=0;},1800);
}

function closeEditor(){document.getElementById('editor-overlay').classList.remove('open');}
document.getElementById('editor-overlay').addEventListener('click',function(e){if(e.target===this)closeEditor();});

// =============================================
// CITATIONS
// =============================================
var CITATIONS=[
 {author:'Violatti, Cristian.',title:'"Neolithic Period."',source:'World History Encyclopedia, 2 Apr. 2018, www.worldhistory.org/Neolithic/. Accessed 17 Apr. 2026.'},
 {author:'Mark, Joshua J.',title:'"Trade in Ancient Mesopotamia: How Commerce Encouraged Civilization."',source:'World History Encyclopedia, 5 Feb. 2026, www.worldhistory.org/article/2114/trade-in-ancient-mesopotamia/. Accessed 17 Apr. 2026.'},
 {author:'Crabben, Jan van der.',title:'"Agriculture in the Fertile Crescent & Mesopotamia."',source:'World History Encyclopedia, 22 Mar. 2023, www.worldhistory.org/article/9/agriculture-in-the-fertile-crescent--mesopotamia/. Accessed 17 Apr. 2026.'},
 {author:'Hancock, James.',title:'"Dynamics of the Neolithic Revolution."',source:'World History Encyclopedia, 7 Feb. 2022, www.worldhistory.org/article/1937/dynamics-of-the-neolithic-revolution/. Accessed 17 Apr. 2026.'},
 {author:'German, Senta.',title:'"Ziggurat of Ur."',source:'Smarthistory, 8 Aug. 2015, smarthistory.org/ziggurat-of-ur/. Accessed 17 Apr. 2026.'},
 {author:'Mark, Joshua J.',title:'"Mesopotamian Religion: Daily Life as a Form of Worship."',source:'World History Encyclopedia, www.worldhistory.org/Mesopotamian_Religion/. Accessed 17 Apr. 2026.'},
 {author:'Mark, Joshua J.',title:'"History of Mesopotamia."',source:'Encyclopaedia Britannica, 28 Mar. 2026, www.britannica.com/place/Mesopotamia-historical-region-Asia. Accessed 17 Apr. 2026.'}
];

function openCitations(){
 var content=document.getElementById('citations-content');
 content.innerHTML='';
 CITATIONS.forEach(function(c){
 var div=document.createElement('div');div.className='citation';
 div.innerHTML='<strong>'+c.author+'</strong> '+c.title+'<br>'+c.source;
 content.appendChild(div);
 });
 document.getElementById('citations-overlay').classList.add('open');
}
function closeCitations(){document.getElementById('citations-overlay').classList.remove('open');}
document.getElementById('citations-overlay').addEventListener('click',function(e){if(e.target===this)closeCitations();});

// =============================================
// INIT
// =============================================
buildStatsUI();
updateStats(0);
updatePeopleLog(0);
prevEraRange=0;
drawMap(0);
</script>
</body>
